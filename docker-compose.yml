services:
  api:
    build: .
    image: isb:latest
    container_name: isb_api
    command: uvicorn isb.presentation.api:app --host 0.0.0.0 --port 8000
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    env_file: .env
    # Note: Port 8000 is intentionally NOT mapped to the host to ensure all ingress
    # traffic is routed exclusively through the Caddy reverse proxy.
    networks:
      - isb_network

  worker:
    build: .
    image: isb:latest
    container_name: isb_worker
    command: python -m isb.main
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    env_file: .env
    networks:
      - isb_network

  caddy:
    image: caddy:2-alpine
    container_name: isb_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - isb_network

networks:
  isb_network:
    driver: bridge

volumes:
  data:
  caddy_data:
  caddy_config:
