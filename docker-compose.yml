services:
  api:
    build: .
    image: isb:latest
    container_name: isb_api
    command: python -m isb.main
    # When you add a web application framework (like FastAPI), uncomment the line below:
    # command: uvicorn isb.presentation.api:app --host 0.0.0.0 --port 8000
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    env_file: .env
    # When exposing ports and healthchecks:
    # ports:
    #   - "8000:8000"
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    networks:
      - isb_network

  worker:
    build: .
    image: isb:latest
    container_name: isb_worker
    command: python -m isb.main
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    env_file: .env
    # To enable GPU capabilities on the worker container when needed:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - isb_network

networks:
  isb_network:
    driver: bridge

volumes:
  data:
